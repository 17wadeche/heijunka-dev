name: Test Aortic SharePoint download
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: aortic-sharepoint-test
  cancel-in-progress: false
jobs:
  test-aortic:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Download Aortic workbook from SharePoint
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python download_sharepoint_sources.py --only Aortic
      - name: Run Aortic IV scrape
        run: python scrape_wip_iv.py --team Aortic --config teams_sharepoint_aortic.json --out IV_DATA\metrics.csv
      - name: Commit and push Aortic output if changed
        shell: bash
        run: |
          git add -A
          if ! git diff --quiet --staged; then
            git commit -m "Automated Aortic SharePoint update"
            git push
          else
            echo "No changes to commit."
          fi